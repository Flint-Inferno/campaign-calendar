<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campaign Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Set CSS var for grid columns from JS */
    .month-header-row, .week-row { --days-per-week: 10; }
    .week-view-header { --days-per-week: 10; }
  </style>
</head>
<body>
<!-- ── Header ──────────────────────────────────────────────── -->
<header>
  <h1 id="calendar-name">Campaign Calendar</h1>
  <span id="save-status">Saving…</span>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="calendar">Calendar</button>
    <button class="tab-btn" data-tab="map">World Map</button>
    <button class="tab-btn" data-tab="timeline">Timeline</button>
    <button class="tab-btn" data-tab="log">Log</button>
  </nav>

  <div class="identity-control">
    <button id="identity-toggle">⚔ <span id="identity-name-display">Set Identity</span></button>
    <div id="identity-panel" class="hidden">
      <label for="identity-name-input">Character Name</label>
      <input id="identity-name-input" type="text" placeholder="Aragorn…" autocomplete="off">
      <label>Color</label>
      <div class="identity-color-row">
        <input id="identity-color-input" type="color" value="#8B2E2E">
        <div id="identity-preview-swatch" style="background:#8B2E2E"></div>
      </div>
      <button id="identity-save">Set Identity</button>
      <hr class="identity-divider">
      <label for="identity-pat-input">Personal PAT <span style="font-size:.7em;opacity:.7">(optional — bypasses roster)</span></label>
      <div class="identity-pat-row">
        <input id="identity-pat-input" type="password" placeholder="ghp_…" autocomplete="off" spellcheck="false">
        <button id="identity-pat-save">Set</button>
        <button id="identity-pat-clear" class="hidden">Remove</button>
      </div>
      <p id="identity-pat-status"></p>
    </div>
  </div>
</header>

<!-- ── Banner ──────────────────────────────────────────────── -->
<div id="banner" class="banner banner-info hidden"></div>

<!-- ── Main body: tab area + persistent sidebar ────────────── -->
<div class="main-body">

  <div class="tab-area">

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- Calendar Tab -->
    <!-- ══════════════════════════════════════════════════════ -->
    <div id="tab-calendar" class="tab-content">

      <div class="calendar-controls">
        <div class="view-toggle">
          <button class="view-btn active" data-view="month">Month</button>
          <button class="view-btn" data-view="week">Week</button>
        </div>

        <div class="nav-controls">
          <button id="prev-btn">◄</button>
          <span id="nav-label"></span>
          <button id="next-btn">►</button>
          <button id="today-btn">Today</button>
        </div>

        <button id="add-event-btn">+ Add Event</button>
      </div>

      <div id="calendar-grid"></div>

    </div>

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- Map Tab -->
    <!-- ══════════════════════════════════════════════════════ -->
    <div id="tab-map" class="tab-content hidden">
      <div class="map-controls">
        <div class="map-scrubber">
          <button id="scrub-prev-btn">◄</button>
          <span id="scrub-date-label">—</span>
          <button id="scrub-next-btn">►</button>
        </div>
        <button id="waypoint-mode-btn">📍 Add Waypoint</button>
      </div>
<div id="map-container">
        <div id="map-placeholder" class="hidden">
          <p style="font-size:1.1rem">No world map uploaded.</p>
          <p style="font-size:0.85rem;color:#5a3a28">Open <strong>/admin.html</strong> to upload your world map image.</p>
        </div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- Timeline Tab -->
    <!-- ══════════════════════════════════════════════════════ -->
    <div id="tab-timeline" class="tab-content hidden">
      <div class="timeline-controls">
        <span class="tl-controls-label">Timeline</span>
        <button id="tl-zoom-in" title="Zoom in">+</button>
        <button id="tl-zoom-out" title="Zoom out">−</button>
        <button id="tl-scroll-now">↓ Now</button>
      </div>
      <div id="timeline-scroll" class="timeline-scroll"></div>
    </div>

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- Log Tab -->
    <!-- ══════════════════════════════════════════════════════ -->
    <div id="tab-log" class="tab-content hidden">
      <div class="log-header">
        <span>Activity Log</span>
        <button id="refresh-log-btn">↺ Refresh</button>
      </div>
      <div id="log-list"></div>
    </div>

  </div><!-- /tab-area -->

  <!-- ── Persistent sidebar ──────────────────────────────── -->
  <aside class="sidebar" id="app-sidebar">
    <div class="current-date-box">
      <h3>Current Date</h3>
      <p id="current-date-display">Loading…</p>
      <div class="clock-wrap">
        <svg id="clock-svg" viewBox="0 0 100 100" width="100" height="100" xmlns="http://www.w3.org/2000/svg">
          <!-- Face -->
          <circle cx="50" cy="50" r="47" fill="#1e0e04" stroke="#8b6914" stroke-width="2"/>
          <circle cx="50" cy="50" r="43" fill="none" stroke="#3a2208" stroke-width="0.8"/>
          <!-- Markers + numerals injected by JS -->
          <g id="clock-markers"></g>
          <!-- Hour hand -->
          <line id="clock-hour-hand" x1="50" y1="50" x2="50" y2="20"
                stroke="#d4a84b" stroke-width="4" stroke-linecap="round"/>
          <!-- Center cap -->
          <circle cx="50" cy="50" r="4" fill="#d4a84b"/>
        </svg>
        <div id="clock-time-label" class="clock-time-label">—</div>
      </div>
      <p id="current-location-display" class="current-location-display"></p>
      <button id="advance-time-toggle">Advance Time ▾</button>
    </div>

    <div id="time-calc-panel" class="hidden">
      <h4>Time Calculator</h4>
      <form id="time-calc-form" onsubmit="return false">
        <div class="tc-dir-row">
          <button type="button" id="tc-dir-btn" data-dir="forward" class="tc-dir-btn active">▶ Forward</button>
          <button type="button" id="tc-dir-btn-back" class="tc-dir-btn">◀ Backward</button>
        </div>
        <div class="tc-dur-grid">
          <div><label>Years</label><input type="number" name="dur-years" value="0" min="0" autocomplete="off"></div>
          <div><label>Months</label><input type="number" name="dur-months" value="0" min="0" autocomplete="off"></div>
          <div><label>Weeks</label><input type="number" name="dur-weeks" value="0" min="0" autocomplete="off"></div>
          <div><label>Days</label><input type="number" name="dur-days" value="0" min="0" autocomplete="off"></div>
          <div><label>Hours</label><input type="number" name="dur-hours" value="0" min="0" autocomplete="off"></div>
        </div>

        <button id="calc-btn">Calculate</button>

        <div id="calc-result-row" class="hidden">
          <div id="calc-result"></div>
          <button id="set-current-btn" data-result="">Set as Current Date</button>
        </div>
      </form>
    </div>
  </aside>

</div><!-- /main-body -->

<!-- ══════════════════════════════════════════════════════════ -->
<!-- Event Modal -->
<!-- ══════════════════════════════════════════════════════════ -->
<div id="event-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-backdrop"></div>
  <div class="modal-box">
    <h2 id="modal-title-heading">New Event</h2>

    <form id="event-form" onsubmit="return false">

      <div class="form-row">
        <label for="ev-title">Title *</label>
        <input id="ev-title" name="title" type="text" placeholder="What happened?" autocomplete="off" required>
      </div>

      <div class="form-row">
        <label for="ev-desc">Description <span style="font-size:0.7em;opacity:.7">(supports [link text](url))</span></label>
        <textarea id="ev-desc" name="description" placeholder="Details, notes, links…"></textarea>
      </div>

      <div class="form-row">
        <label for="ev-location">Location <span style="font-size:0.7em;opacity:.7">(optional)</span></label>
        <input id="ev-location" name="location" type="text" placeholder="e.g. Thornwall Inn">
      </div>

      <div class="form-row">
        <label>Start Date &amp; Time</label>
        <div class="date-picker-row">
          <div>
            <label>Year</label>
            <input name="start-year" type="number" min="1" value="1">
          </div>
          <div>
            <label>Month</label>
            <select name="start-month"></select>
          </div>
          <div>
            <label>Week</label>
            <select name="start-week"></select>
          </div>
          <div>
            <label>Day</label>
            <select name="start-day"></select>
          </div>
          <div>
            <label>Hour</label>
            <select name="start-hour"></select>
          </div>
        </div>
      </div>

      <div class="has-end-row">
        <input id="has-end-cb" name="has-end" type="checkbox">
        <label for="has-end-cb">Has end date/time</label>
      </div>

      <div id="end-date-row" class="form-row hidden">
        <label>End Date &amp; Time</label>
        <div class="date-picker-row">
          <div>
            <label>Year</label>
            <input name="end-year" type="number" min="1" value="1">
          </div>
          <div>
            <label>Month</label>
            <select name="end-month"></select>
          </div>
          <div>
            <label>Week</label>
            <select name="end-week"></select>
          </div>
          <div>
            <label>Day</label>
            <select name="end-day"></select>
          </div>
          <div>
            <label>Hour</label>
            <select name="end-hour"></select>
          </div>
        </div>
      </div>

      <div class="form-row">
        <label>Event Color</label>
        <div class="color-picker-row">
          <div id="color-swatch-grid"></div>
          <div id="color-preview" style="background:#6B3A2A"></div>
          <input id="color-hex-input" name="color" type="text" placeholder="#6B3A2A" maxlength="7">
        </div>
      </div>

      <div class="form-row">
        <label>Marker Type</label>
        <div class="mtype-row" id="ev-mtype-row">
          <button type="button" class="mtype-btn active" data-mtype="event" id="mtype-event-btn">Event</button>
          <button type="button" class="mtype-btn" data-mtype="waypoint" id="mtype-waypoint-btn">Waypoint</button>
          <button type="button" class="mtype-btn" data-mtype="none" id="mtype-none-btn">None</button>
        </div>
      </div>

      <div class="form-row">
        <label for="ev-tags">Tags <span style="font-size:0.7em;opacity:.7">(comma-separated)</span></label>
        <input id="ev-tags" name="tags" type="text" placeholder="combat, travel, story">
      </div>

      <div class="form-row">
        <label>Map Coordinates <span style="font-size:0.7em;opacity:.7">(set via 📍 on map, or manually)</span></label>
        <div class="map-coords-row">
          <div>
            <label>X</label>
            <input name="mapX" type="number" placeholder="auto">
          </div>
          <div>
            <label>Y</label>
            <input name="mapY" type="number" placeholder="auto">
          </div>
        </div>
      </div>

    </form>

    <div class="modal-actions">
      <button id="delete-event-btn" class="hidden">Delete</button>
      <button id="reposition-pin-btn" class="hidden">📍 Reposition Waypoint</button>
      <button id="cancel-event-btn">Cancel</button>
      <button id="save-event-btn">Save</button>
    </div>
  </div>
</div>


<!-- ══════════════════════════════════════════════════════════ -->
<!-- Advance Time Confirm Modal -->
<!-- ══════════════════════════════════════════════════════════ -->
<div id="advance-confirm-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-backdrop"></div>
  <div class="modal-box">
    <h2>Advance Time</h2>
    <p id="advance-confirm-to" class="advance-confirm-to"></p>

    <div id="advance-skip-fields" class="hidden">
      <div class="form-row">
        <label for="advance-title-text">Title *</label>
        <input id="advance-title-text" type="text" placeholder="Time Skip →" autocomplete="off">
      </div>

      <div class="form-row">
        <label for="advance-desc-text">Description <span style="font-size:.7em;opacity:.7">(optional)</span></label>
        <textarea id="advance-desc-text" placeholder="Details…" rows="2"></textarea>
      </div>
    </div>

    <div class="form-row">
      <label>Reason</label>
      <div class="reason-presets">
        <button class="reason-btn" data-reason="Short Rest">Short Rest</button>
        <button class="reason-btn" data-reason="Long Rest">Long Rest</button>
        <button class="reason-btn" data-reason="Travel">Travel</button>
        <button class="reason-btn" data-reason="Downtime">Downtime</button>
        <button class="reason-btn" data-reason="Combat">Combat</button>
        <button class="reason-btn" data-reason="Other">Other</button>
      </div>
      <input id="advance-reason-text" type="text" placeholder="Details (optional)">
    </div>

    <div class="form-row">
      <label>Current Location <span style="font-size:.7em;opacity:.7">(optional — where is the party now?)</span></label>
      <input id="advance-location-text" type="text" placeholder="e.g. Thornwall Inn, Forest Road…">
    </div>

    <div id="advance-color-row" class="form-row hidden">
      <label>Time Skip Color <span style="font-size:.7em;opacity:.7">(inherits last chain waypoint)</span></label>
      <div class="color-picker-row">
        <div id="advance-color-swatch-grid"></div>
        <div id="advance-color-preview" style="background:#8b6914"></div>
        <input id="advance-hex-input" type="text" placeholder="#8b6914" maxlength="7">
      </div>
    </div>

    <div class="modal-actions">
      <button id="advance-confirm-cancel">Cancel</button>
      <button id="advance-confirm-ok">Advance Time →</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- Quick Waypoint Modal -->
<!-- ══════════════════════════════════════════════════════════ -->
<div id="quick-waypoint-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-backdrop"></div>
  <div class="modal-box">
    <h2>Add Waypoint</h2>
    <div class="form-row">
      <label for="qp-title">Title *</label>
      <input id="qp-title" type="text" placeholder="What happened here?" autocomplete="off">
    </div>
    <div class="form-row">
      <label for="qp-desc">Description <span style="font-size:.7em;opacity:.7">(optional)</span></label>
      <textarea id="qp-desc" placeholder="Details…" rows="2"></textarea>
    </div>
    <div class="form-row">
      <label for="qp-location">Location <span style="font-size:.7em;opacity:.7">(optional)</span></label>
      <input id="qp-location" type="text" placeholder="e.g. Thornwall Inn">
    </div>
    <div class="form-row">
      <label>Date &amp; Time</label>
      <div class="date-picker-row">
        <div><label>Year</label><input name="qp-year" type="number" min="1" autocomplete="off"></div>
        <div><label>Month</label><select name="qp-month"></select></div>
        <div><label>Week</label><select name="qp-week"></select></div>
        <div><label>Day</label><select name="qp-day"></select></div>
        <div><label>Hour</label><select name="qp-hour"></select></div>
      </div>
    </div>
    <div class="form-row">
      <label>Marker Type</label>
      <div class="mtype-row" id="qp-mtype-row">
        <button type="button" class="mtype-btn active" data-mtype="waypoint" id="qp-mtype-waypoint">Waypoint</button>
        <button type="button" class="mtype-btn" data-mtype="event" id="qp-mtype-event">Event</button>
        <button type="button" class="mtype-btn" data-mtype="none" id="qp-mtype-none">None</button>
      </div>
    </div>
    <div class="form-row">
      <label>Color</label>
      <div class="color-picker-row">
        <div id="qp-swatch-grid"></div>
        <div id="qp-color-preview" style="background:#6B3A2A"></div>
        <input id="qp-hex-input" type="text" placeholder="#6B3A2A" maxlength="7">
      </div>
    </div>
    <div class="modal-actions">
      <button id="qp-cancel-btn">Cancel</button>
      <button id="qp-save-btn">Add Waypoint</button>
    </div>
  </div>
</div>

<!-- ── Scripts ─────────────────────────────────────────────── -->
<script src="js/repo-config.js"></script>
<script src="js/github-api.js"></script>
<script src="js/time-calc.js"></script>
<script src="js/events.js"></script>
<script src="js/activity-log.js"></script>
<!-- ══════════════════════════════════════════════════════════ -->
<!-- Event Popover -->
<!-- ══════════════════════════════════════════════════════════ -->
<div id="event-popover" class="event-popover hidden" role="dialog">
  <button class="popover-close" id="popover-close-btn" aria-label="Close">×</button>
  <div class="popover-body">
    <div class="popover-title" id="popover-ev-title"></div>
    <div class="popover-date"  id="popover-ev-date"></div>
    <div class="popover-location hidden" id="popover-ev-location"></div>
    <div class="popover-desc   hidden" id="popover-ev-desc"></div>
  </div>
  <div class="popover-footer">
    <button class="popover-edit-btn" id="popover-edit-btn">Edit</button>
  </div>
</div>

<script src="js/calendar.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/map.js"></script>
<script src="js/timeline.js"></script>
<script src="js/app.js"></script>

</body>
</html>
